{% extends 'base.html' %}
{% block title %}{{ title|default:"Confirm Delete" }} - Notekhata{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card bg-body-tertiary p-5 border border-danger shadow">
                <h4 class="text-danger fw-bold mb-3">
                    <i class="fa-solid fa-triangle-exclamation me-2"></i>{{ title|default:"Confirm Delete?" }}
                </h4>
                <p class="text-light opacity-75">
                    {{ warning_message|safe }}
                </p>
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger fw-bold py-2">
                            {{ delete_btn_text|default:"Yes, Delete" }}
                        </button>
                        {% if cancel_url %}
                            <a href="{{ cancel_url }}" class="btn btn-outline-secondary py-2">Cancel</a>
                        {% endif %}
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
