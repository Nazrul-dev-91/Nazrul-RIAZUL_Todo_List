{% extends 'base.html' %}
{% block title %}Delete Board{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card bg-body-tertiary p-5 border border-danger shadow">
                <h4 class="text-danger fw-bold mb-3">
                    <i class="fa-solid fa-triangle-exclamation"></i> Delete Board?
                </h4>
                <p class="text-light">
                    Are you sure you want to delete the board <strong>"{{ board.title }}"</strong>? 
                    This action will permanently remove the board and all lists/tasks associated with it.
                </p>
                <form method="post" class="mt-3">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger fw-bold">Yes, Delete Board</button>
                        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
