{% extends 'base.html' %}
{% load widget_tweaks %}
{% block title %}{{ action|default:"Create" }} List{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="login-card">
                <h4 class="text-info fw-bold mb-4">{{ action|default:"Add New" }} List</h4>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small text-muted text-uppercase">List Title</label>
                        {{ form.title|add_class:"form-control bg-dark text-white border-secondary" }}
                    </div>
                    <button type="submit" class="btn btn-info w-100 fw-bold">{{ action|default:"Create" }}</button>
                    <a href="{% url 'board_detail' board.id %}" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
